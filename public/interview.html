<!DOCTYPE html>
<html>
<head>
  <title>AI Interview Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
    }

    #warning {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>AI Interview (Pro Mode)</h2>

  <p id="question">Loading...</p>

  <video id="camera" autoplay muted></video>

  <textarea id="answer" placeholder="Speak or type your answer..."></textarea>

  <button onclick="startVoice()">🎤 Start Voice</button>
  <button onclick="submitAnswer()">Submit</button>
  <button onclick="nextQuestion()">Next</button>

  <p id="result"></p>
  <p id="warning"></p>
</div>

<script>

let currentQuestion = "";
let trustScore = 100;
let warnings = 0;

// 🎥 CAMERA START
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById("camera").srcObject = stream;
  } catch {
    alert("Camera access required!");
  }
}

// 🎤 VOICE INPUT
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    document.getElementById("answer").value = event.results[0][0].transcript;
  };

  recognition.start();
}

// 🔥 LOAD QUESTION
async function loadQuestion() {
  const res = await fetch("/api/interview/start");
  const data = await res.json();

  currentQuestion = data.question;
  document.getElementById("question").innerText = currentQuestion;
}

// 🔥 SUBMIT
async function submitAnswer() {
  const answer = document.getElementById("answer").value;

  const res = await fetch("/api/interview/answer", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      question: currentQuestion,
      answer,
      trust: trustScore
    })
  });

  const data = await res.json();

  document.getElementById("result").innerText = data.evaluation;
}

// 🔥 NEXT
function nextQuestion() {
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  loadQuestion();
}

// 🚨 TAB SWITCH DETECTION
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    warnings++;
    trustScore -= 20;

    document.getElementById("warning").innerText =
      `⚠️ Tab switch detected! Warnings: ${warnings}`;
  }
});

// 🚨 COPY DETECTION
document.addEventListener("copy", () => {
  warnings++;
  trustScore -= 10;
});

// 🚨 RIGHT CLICK BLOCK
document.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  warnings++;
  trustScore -= 5;
});

// INIT
startCamera();
loadQuestion();

</script>

</body>
</html>
